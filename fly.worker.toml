# OracleBook worker (cron jobs: auction, oracle ingestion, settlement)
# Deploy: fly deploy -c fly.worker.toml
# Create app: fly apps create oraclebook-worker (or use -a oraclebook-worker)
# Secrets: same as server (DATABASE_URL, FUTURO_ADMIN_KEY, etc.)

app = "oraclebook-worker"

[build]
  dockerfile = "Dockerfile.worker"

[env]
  NODE_ENV = "production"
  WORKER_PORT = "8081"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "45s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"
